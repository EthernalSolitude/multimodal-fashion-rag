name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock ruff structlog prometheus-client python-dotenv openai pydantic fastapi python-multipart pillow qdrant-client

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest
